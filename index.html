<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Carry home 選品大調查</title>
<style>
body { font-family: sans-serif; background-color: #f1f8e9; margin: 0; padding: 20px; display: flex; justify-content: center; }
.container { max-width: 500px; width: 100%; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
h1 { font-size: 1.4rem; color: #000; font-weight: bold; text-align: center; margin-bottom: 20px; }
.intro { font-size: 0.9rem; background: #f9fdf9; padding: 15px; border-radius: 10px; border: 1px dashed #aed581; margin-bottom: 20px; line-height: 1.5; }
.q-group { margin-bottom: 25px; }
.q-title { font-weight: bold; display: block; margin-bottom: 10px; font-size: 1rem; color: #000; }
.hint { font-size: 0.8rem; color: #666; display: block; margin: -5px 0 10px 0; }
.opt { display: flex; align-items: center; padding: 12px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 8px; cursor: pointer; font-size: 0.95rem; }
input[type="checkbox"], input[type="radio"] { margin-right: 10px; width: 18px; height: 18px; accent-color: #aed581; }
input[type="text"] { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; }
button { width: 100%; padding: 15px; background: #aed581; color: white; border: none; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(174,213,129,0.3); }
footer { text-align: center; font-size: 0.7rem; color: #ccc; margin-top: 30px; }
</style>
</head>
<body>
<div class="container">
<h1>Carry home 選品大調查 🎁</h1>
<div class="intro">謝謝你支持 Carry home！🐾<br>我們想更了解你的喜好，讓你最愛的小東西都能輕鬆帶回家。</div>
<form action="https://formspree.io/f/mqakezql" method="POST">
<div class="q-group">
<span class="q-title">1-1. 平時最常關注的主題類別？</span>
<span class="hint">(最多選3個)</span>
<label class="opt"><input type="checkbox" name="主題" value="玩具總動員">玩具總動員</label>
<label class="opt"><input type="checkbox" name="主題" value="湯姆貓與傑利鼠">湯姆貓與傑利鼠</label>
<label class="opt"><input type="checkbox" name="主題" value="史努比">史努比</label>
<label class="opt"><input type="checkbox" name="主題" value="麵包超人">麵包超人</label>
<label class="opt"><input type="checkbox" name="主題" value="蠟筆小新">蠟筆小新</label>
<label class="opt"><input type="checkbox" name="主題" value="海綿寶寶">海綿寶寶</label>
<label class="opt"><input type="checkbox" name="主題" value="其他">其他</label>
</div>
<div class="q-group">
<span class="q-title">1-2. 通常吸引你下單的原因？</span>
<span class="hint">(最多選2個)</span>
<label class="opt"><input type="checkbox" name="原因" value="視覺好看">視覺好看</label>
<label class="opt"><input type="checkbox" name="原因" value="實用性高">實用性高</label>
<label class="opt"><input type="checkbox" name="原因" value="價格親民">價格親民</label>
</div>
<div class="q-group">
<span class="q-title">2-1. 你最偏好的風格？</span>
<label class="opt"><input type="radio" name="風格" value="生活實用" required>生活實用型</label>
<label class="opt"><input type="radio" name="風格" value="擺飾可愛">擺飾可愛型</label>
</div>
<div class="q-group">
<span class="q-title">2-2. 最近想找什麼樣的商品？</span>
<input type="text" name="許願" placeholder="例如：手機殼...">
</div>
<div class="q-group">
<span class="q-title">3. 願意支付的預算範圍？</span>
<label class="opt"><input type="radio" name="預算" value="100-300" required>100-300</label>
<label class="opt"><input type="radio" name="預算" value="300-600">300-600</label>
<label class="opt"><input type="radio" name="預算" value="600+">600以上</label>
</div>
<div class="q-group">
<span class="q-title">4. 舉辦限動二選一投票？</span>
<label class="opt"><input type="radio" name="投票" value="是" required>是</label>
<label class="opt"><input type="radio" name="投票" value="否">否</label>
</div>
<button type="submit">送出調查 💌</button>
</form>
<footer>© Carry home Selection 🌱</footer>
</div>
</body>
</html>
